<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="대한민국 대 멕시코 경기 결과 예측" />
    <title>대한민국 : 멕시코 결과 예측</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260613-21" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div class="header-line">
          <h1>월드컵 결과 예측</h1>
          <span id="connectionLabel" class="connection">연결 중</span>
        </div>
        <div class="match-title">
          <strong>대한민국</strong>
          <span>:</span>
          <strong>멕시코</strong>
        </div>
        <div class="status-board">
          <span>참가 인원</span>
          <strong id="claimedCount">0</strong>
          <span>명</span>
          <span class="score-count">스코어 <b id="availableCount">16</b>개</span>
        </div>
      </header>

      <section
        id="scoreGrid"
        class="score-sections"
        aria-label="예상 스코어"
        aria-live="polite"
      ></section>

      <section class="management">
        <form id="addScoreForm" class="add-score-form">
          <h2>스코어 추가</h2>
          <label>
            <span>대한민국</span>
            <input
              name="homeScore"
              type="number"
              min="0"
              max="99"
              inputmode="numeric"
              required
            />
          </label>
          <b>:</b>
          <label>
            <span>멕시코</span>
            <input
              name="awayScore"
              type="number"
              min="0"
              max="99"
              inputmode="numeric"
              required
            />
          </label>
          <button type="submit">추가</button>
        </form>

        <button id="resetButton" class="reset-button" type="button">
          전체 초기화
        </button>
      </section>

      <footer>토목사업소(시설개량팀) · v21</footer>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <dialog id="registerDialog" class="modal">
      <form id="registerForm">
        <p class="modal-label">참여하기</p>
        <h2><span id="registerScore">0 : 0</span> 예상</h2>
        <input
          name="name"
          type="text"
          maxlength="12"
          autocomplete="name"
          placeholder="이름을 입력하세요"
          required
        />
        <div class="modal-actions">
          <button id="cancelRegister" type="button" class="button-secondary">
            돌아가기
          </button>
          <button type="submit" class="button-primary">이름 등록</button>
        </div>
      </form>
    </dialog>

    <dialog id="resetDialog" class="modal">
      <form id="resetForm">
        <p class="modal-label">전체 초기화</p>
        <h2>모든 참여 기록을 지울까요?</h2>
        <input
          name="password"
          type="password"
          inputmode="numeric"
          autocomplete="off"
          placeholder="비밀번호"
          required
        />
        <div class="modal-actions">
          <button id="cancelReset" type="button" class="button-secondary">
            돌아가기
          </button>
          <button type="submit" class="button-danger">초기화</button>
        </div>
      </form>
    </dialog>

    <dialog id="cancelEntryDialog" class="modal">
      <form id="cancelEntryForm">
        <p class="modal-label">등록 취소</p>
        <h2>이 이름을 삭제할까요?</h2>
        <p>선택한 참여 기록만 삭제됩니다.</p>
        <div class="modal-actions">
          <button id="keepEntry" type="button" class="button-secondary">
            돌아가기
          </button>
          <button type="submit" class="button-danger">삭제</button>
        </div>
      </form>
    </dialog>

    <script src="firebase-config.js?v=20260613-21"></script>
    <script type="module" src="app.js?v=20260613-21"></script>
  </body>
</html>
